<header class="header">
    <div class="container">
        <div class="header__shell">
            <div class="header__inner">
                <a class="logo" href="#">
                    <img class="logo__svg" height="60" alt="" src="../../../../public/icons/italika-logo.svg" />
                </a>

                <div class="header-search">
                    <form class="searchbar" action="#">
                        <input class="searchbar__field" type="text"
                            placeholder="Поиск по товарам, категориям и брендам">
                        <button class="searchbar__submit" type="submit" aria-label="Найти"></button>
                    </form>
                </div>

                <div class="header__actions">
                    <div class="contact-pill">
                        <strong>+7 800 222-79-70</strong>
                        <span>Заказы и консультации</span>
                    </div>

                    <a class="icon-link" href="#" aria-label="Личный кабинет">
                        <svg viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="8" r="4" stroke-width="1.8"></circle>
                            <path d="M4 20c1.8-3.8 5-5.7 8-5.7S18.2 16.2 20 20" stroke-width="1.8"
                                stroke-linecap="round"></path>
                        </svg>
                    </a>

                    <a class="icon-link" href="#" aria-label="Избранное">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M12 20.2 4.7 13.4A4.9 4.9 0 0 1 11.5 6l.5.6.5-.6a4.9 4.9 0 0 1 6.8 7.3L12 20.2Z"
                                stroke-width="1.8" stroke-linejoin="round"></path>
                        </svg>
                        <span class="icon-link__count">2</span>
                    </a>

                    <a class="icon-link" href="#" aria-label="Корзина">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M3.5 5H6l1.6 8.1c.1.7.7 1.2 1.4 1.2h7.7c.7 0 1.3-.5 1.4-1.2L19.5 8H7.1"
                                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                            <circle cx="10" cy="18.2" r="1.2" fill="currentColor" stroke="none"></circle>
                            <circle cx="17" cy="18.2" r="1.2" fill="currentColor" stroke="none"></circle>
                        </svg>
                        <span class="icon-link__count">4</span>
                    </a>
                </div>
            </div>

            <nav class="nav">
                <div class="nav__scroll">
                    <div class="nav__list">
                        <a class="nav__item nav__item--catalog nav__item--feature" href="#">
                            <span class="nav__item-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24">
                                    <rect x="3" y="3" width="4" height="4" rx="1"></rect>
                                    <rect x="10" y="3" width="4" height="4" rx="1"></rect>
                                    <rect x="17" y="3" width="4" height="4" rx="1"></rect>
                                    <rect x="3" y="10" width="4" height="4" rx="1"></rect>
                                    <rect x="10" y="10" width="4" height="4" rx="1"></rect>
                                    <rect x="17" y="10" width="4" height="4" rx="1"></rect>
                                    <rect x="3" y="17" width="4" height="4" rx="1"></rect>
                                    <rect x="10" y="17" width="4" height="4" rx="1"></rect>
                                    <rect x="17" y="17" width="4" height="4" rx="1"></rect>
                                </svg>
                            </span>
                            <span>Каталог</span>
                        </a>

                        <a class="nav__item nav__item--sale nav__item--feature" href="#">
                            <span class="nav__item-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24">
                                    <path d="M13.5 2 5 13h5l-1.5 9L19 10h-5L13.5 2Z"></path>
                                </svg>
                            </span>
                            <span>Акции</span>
                        </a>

                        <span class="nav__divider" aria-hidden="true"></span>

                        <a class="nav__item" href="#">

                        </a>

                        <a class="nav__item" href="#">
                            <span>Новости</span>
                        </a>

                        <a class="nav__item" href="#">
                            <span>Рецепты</span>
                        </a>

                        <a class="nav__item" href="#">
                            <span>О нас</span>
                        </a>

                        <a class="nav__item" href="#">
                            <span>Контакты</span>
                        </a>
                    </div>
                </div>
            </nav>
        </div>
    </div>
