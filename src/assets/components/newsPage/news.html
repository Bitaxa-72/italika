<section
  class="news-page"
  data-news-page
  data-news-endpoint=""
>
  <div class="container">
    <div class="news-page__head">
      <div class="news-page__intro">
        <h1 class="news-page__title">Новости</h1>
      </div>

      <div class="news-page__subscribe">
        <div>
          <h2 class="news-page__subscribe-title">
            Новости и рецепты на почту
          </h2>
          <p class="news-page__subscribe-text">
            Отправляем полезные подборки и обновления сайта.
          </p>
        </div>
        <button
          class="news-page__subscribe-button"
          type="button"
          data-subscribe-open
        >
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M4.5 6.5h15v11h-15v-11Z"
              stroke-width="1.8"
              stroke-linejoin="round"
            ></path>
            <path
              d="m5 7 7 6 7-6"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </svg>
          <span>Подписаться</span>
        </button>
      </div>
    </div>

    <div class="news-page__layout">
      <aside
        class="news-page__aside"
        aria-label="Категории новостей"
      >
        <div class="news-page__filter">
          <div class="news-page__filter-title">Категории</div>
          <div
            class="news-page__categories js-news-page-categories"
          ></div>
        </div>
      </aside>

      <div class="news-page__content">
        <article class="news-page__featured js-news-page-featured"></article>

        <div
          class="news-page__grid js-news-page-grid"
          aria-live="polite"
        ></div>

        <div
          class="news-page__empty js-news-page-empty"
          hidden
        >
          <h2 class="news-page__empty-title">
            Новости не найдены
          </h2>
          <p class="news-page__empty-text">
            Выберите другую категорию или сбросьте фильтр.
          </p>
        </div>

        <div class="news-page__actions">
          <button
            class="news-page__more js-news-page-more"
            type="button"
          >
            <span class="news-page__more-text"
              >Загрузить еще</span
            >
            <span
              class="news-page__more-spinner"
              aria-hidden="true"
            ></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    ;(function () {
      var section = document.querySelector('[data-news-page]')

      if (!section) {
        return
      }

      var featured = section.querySelector(
        '.js-news-page-featured'
      )
      var grid = section.querySelector('.js-news-page-grid')
      var categoriesNode = section.querySelector(
        '.js-news-page-categories'
      )
      var empty = section.querySelector('.js-news-page-empty')
      var moreButton = section.querySelector(
        '.js-news-page-more'
      )
      var moreButtonText = moreButton.querySelector(
        '.news-page__more-text'
      )
      var endpoint = section.getAttribute('data-news-endpoint')
      var pageSize = 13
      var currentPage = 1
      var currentCategory = 'all'
      var totalCount = 0
      var renderedCount = 0
      var isLoading = false
      var categories = [
        { id: 'all', title: 'Все новости' },
        { id: 'assortment', title: 'Ассортимент' },
        { id: 'events', title: 'События' },
        { id: 'clients', title: 'Клиентам' },
        { id: 'workshops', title: 'Мастер-классы' },
        { id: 'delivery', title: 'Поставки' }
      ]
      var news = [
        {
          title:
            'Обновили подборку сезонных ингредиентов и упаковки к весеннему меню',
          excerpt:
            'Собрали позиции для десертов, витрин и подарочных наборов.',
          categoryId: 'assortment',
          category: 'Ассортимент',
          date: '20 марта 2026',
          image: 'img/2.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Открыли запись на весенние мастер-классы для кондитеров',
          excerpt:
            'В программе муссовые десерты, шоколадный декор и работа с начинками.',
          categoryId: 'workshops',
          category: 'Мастер-классы',
          date: '08 февраля 2026',
          image: 'img/3.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'В ассортименте появились новые формы и декор для муссовых десертов',
          excerpt:
            'Добавили позиции для малых партий и ежедневной витрины.',
          categoryId: 'assortment',
          category: 'Ассортимент',
          date: '03 октября 2025',
          image: 'img/4.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Подготовили фотоотчет с отраслевой встречи по ингредиентам',
          excerpt:
            'Коротко о поставках, инвентаре и новых решениях для производства.',
          categoryId: 'events',
          category: 'События',
          date: '29 августа 2025',
          image: 'img/2.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Изменили график поставок по ходовым позициям',
          excerpt:
            'Часть категорий теперь приезжает чаще, чтобы держать склад стабильнее.',
          categoryId: 'delivery',
          category: 'Поставки',
          date: '17 сентября 2025',
          image: 'img/3.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Подвели итоги отраслевой встречи в Екатеринбурге',
          excerpt:
            'Собрали материалы для партнеров и оптовых клиентов.',
          categoryId: 'events',
          category: 'События',
          date: '14 апреля 2025',
          image: 'img/4.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Обновили условия для оптовых клиентов',
          excerpt:
            'Расширили список акционных категорий и упростили повторные заявки.',
          categoryId: 'clients',
          category: 'Клиентам',
          date: '11 января 2025',
          image: 'img/2.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Снизили минимальную партию на ряд позиций',
          excerpt:
            'Решение подойдет небольшим кондитерским цехам и кофейням.',
          categoryId: 'clients',
          category: 'Клиентам',
          date: '04 июня 2024',
          image: 'img/3.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Добавили упаковку для эклеров с прозрачным окном',
          excerpt:
            'Новые размеры уже доступны для тестовых заказов.',
          categoryId: 'assortment',
          category: 'Ассортимент',
          date: '18 мая 2024',
          image: 'img/4.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Новый график консультаций технолога',
          excerpt:
            'Разобрать рецептуру и подобрать ингредиенты можно по предварительной записи.',
          categoryId: 'workshops',
          category: 'Мастер-классы',
          date: '22 марта 2024',
          image: 'img/2.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Популярные позиции снова доступны к заказу',
          excerpt:
            'На склад вернулись ходовые красители, формы и шоколад в каллетах.',
          categoryId: 'delivery',
          category: 'Поставки',
          date: '15 февраля 2024',
          image: 'img/3.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Собрали наборы для сезонной витрины',
          excerpt:
            'Ингредиенты, декор и упаковка для десертов на каждый день.',
          categoryId: 'assortment',
          category: 'Ассортимент',
          date: '07 ноября 2023',
          image: 'img/4.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Обновили регламент сборки заказов',
          excerpt:
            'Оптовые заявки теперь проходят дополнительную проверку комплектации.',
          categoryId: 'clients',
          category: 'Клиентам',
          date: '10 октября 2023',
          image: 'img/2.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Партнерская дегустация шоколада',
          excerpt:
            'Провели встречу с кондитерами и собрали обратную связь по линейке.',
          categoryId: 'events',
          category: 'События',
          date: '19 сентября 2023',
          image: 'img/3.jpg',
          href: 'news-single.html'
        },
        {
          title:
            'Расширили линейку расходных материалов для цехов',
          excerpt:
            'Добавили позиции для ежедневной сборки заказов и оформления витрин.',
          categoryId: 'assortment',
          category: 'Ассортимент',
          date: '02 августа 2023',
          image: 'img/4.jpg',
          href: 'news-single.html'
        }
      ]

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;')
      }

      function normalizeNews(response) {
        if (Array.isArray(response)) {
          return {
            items: response,
            total: response.length
          }
        }

        return {
          items: response.items || response.news || [],
          total:
            response.total ||
            response.count ||
            (response.items || response.news || []).length
        }
      }

      function getDemoNews(categoryId, page) {
        var filteredNews =
          categoryId === 'all'
            ? news
            : news.filter(function (item) {
                return item.categoryId === categoryId
              })
        var start = (page - 1) * pageSize

        return {
          items: filteredNews.slice(start, start + pageSize),
          total: filteredNews.length
        }
      }

      function requestNews(categoryId, page) {
        var url

        if (!endpoint) {
          return new Promise(function (resolve) {
            setTimeout(function () {
              resolve(getDemoNews(categoryId, page))
            }, 320)
          })
        }

        url = new URL(endpoint, window.location.origin)
        url.searchParams.set('category', categoryId)
        url.searchParams.set('page', page)
        url.searchParams.set('limit', pageSize)

        return fetch(url.toString(), {
          headers: {
            Accept: 'application/json'
          }
        })
          .then(function (response) {
            if (!response.ok) {
              throw new Error('News request failed')
            }

            return response.json()
          })
          .then(normalizeNews)
      }

      function createNewsCardMarkup(item, isFeatured) {
        var cardClass = isFeatured
          ? 'news-page__card news-page__card--featured'
          : 'news-page__card'

        return (
          '' +
          '<article class="' +
          cardClass +
          '">' +
          '<a class="news-page__media" href="' +
          escapeHtml(item.href) +
          '">' +
          '<img class="news-page__image" src="' +
          escapeHtml(item.image) +
          '" alt="' +
          escapeHtml(item.title) +
          '" loading="lazy" decoding="async">' +
          '</a>' +
          '<div class="news-page__body">' +
          '<div class="news-page__meta">' +
          '<span>' +
          escapeHtml(item.category) +
          '</span>' +
          '<time>' +
          escapeHtml(item.date) +
          '</time>' +
          '</div>' +
          '<h2 class="news-page__name">' +
          '<a href="' +
          escapeHtml(item.href) +
          '">' +
          escapeHtml(item.title) +
          '</a>' +
          '</h2>' +
          '<p class="news-page__excerpt">' +
          escapeHtml(item.excerpt) +
          '</p>' +
          '</div>' +
          '</article>'
        )
      }

      function createSkeletonMarkup() {
        return (
          '' +
          '<div class="news-page__card news-page__card--skeleton">' +
          '<span class="news-page__media">' +
          '<span class="news-page__skeleton news-page__skeleton-image"></span>' +
          '</span>' +
          '<span class="news-page__body">' +
          '<span class="news-page__skeleton news-page__skeleton-meta"></span>' +
          '<span class="news-page__skeleton news-page__skeleton-title"></span>' +
          '<span class="news-page__skeleton news-page__skeleton-title news-page__skeleton-title--short"></span>' +
          '<span class="news-page__skeleton news-page__skeleton-text"></span>' +
          '</span>' +
          '</div>'
        )
      }

      function appendMarkup(markup, parent) {
        var wrapper = document.createElement('div')
        wrapper.innerHTML = markup
        parent.appendChild(wrapper.firstChild)
      }

      function renderCategories() {
        var i = 0

        categoriesNode.innerHTML = ''

        for (i = 0; i < categories.length; i++) {
          appendMarkup(
            '' +
              '<button class="news-page__category" type="button" data-news-category="' +
              escapeHtml(categories[i].id) +
              '" aria-pressed="false">' +
              '<span>' +
              escapeHtml(categories[i].title) +
              '</span>' +
              '</button>',
            categoriesNode
          )
        }
      }

      function updateCategories() {
        var buttons = categoriesNode.querySelectorAll(
          '[data-news-category]'
        )
        var i = 0

        for (i = 0; i < buttons.length; i++) {
          buttons[i].classList.toggle(
            'is-active',
            buttons[i].getAttribute(
              'data-news-category'
            ) === currentCategory
          )
          buttons[i].setAttribute(
            'aria-pressed',
            buttons[i].classList.contains('is-active')
              ? 'true'
              : 'false'
          )
        }
      }

      function appendNews(items, page) {
        var fragment = document.createDocumentFragment()
        var wrapper = document.createElement('div')
        var startIndex = page === 1 ? 1 : 0
        var i = 0

        if (page === 1) {
          featured.innerHTML = items[0]
            ? createNewsCardMarkup(items[0], true)
            : ''
        }

        for (i = startIndex; i < items.length; i++) {
          wrapper.innerHTML = createNewsCardMarkup(items[i])
          fragment.appendChild(wrapper.firstChild)
        }

        grid.appendChild(fragment)
      }

      function appendSkeletons(count) {
        var fragment = document.createDocumentFragment()
        var wrapper = document.createElement('div')
        var i = 0

        for (i = 0; i < count; i++) {
          wrapper.innerHTML = createSkeletonMarkup()
          fragment.appendChild(wrapper.firstChild)
        }

        grid.appendChild(fragment)
      }

      function removeSkeletons() {
        var skeletons = grid.querySelectorAll(
          '.news-page__card--skeleton'
        )
        var i = 0

        for (i = 0; i < skeletons.length; i++) {
          skeletons[i].parentNode.removeChild(skeletons[i])
        }
      }

      function updateMoreButton() {
        var hasMore = renderedCount < totalCount

        moreButton.hidden = !hasMore
        moreButton.disabled = !hasMore || isLoading
        moreButton.classList.toggle('is-loading', isLoading)
        moreButtonText.textContent = isLoading
          ? 'Загрузка'
          : 'Загрузить еще'
      }

      function setLoading(nextState) {
        isLoading = nextState
        section.classList.toggle('is-loading', isLoading)
        updateMoreButton()
      }

      function renderNews(page, shouldReset) {
        if (isLoading) {
          return
        }

        setLoading(true)
        empty.hidden = true

        if (shouldReset) {
          featured.innerHTML = ''
          grid.innerHTML = ''
          currentPage = 1
          totalCount = 0
          renderedCount = 0
        }

        appendSkeletons(pageSize)

        requestNews(currentCategory, page)
          .then(function (result) {
            removeSkeletons()
            totalCount = result.total
            appendNews(result.items, page)
            renderedCount += result.items.length
            currentPage = page
            empty.hidden = totalCount !== 0
          })
          .catch(function () {
            removeSkeletons()
            empty.hidden = false
          })
          .finally(function () {
            setLoading(false)
          })
      }

      categoriesNode.addEventListener('click', function (event) {
        var button = event.target.closest(
          '[data-news-category]'
        )

        if (!button) {
          return
        }

        currentCategory = button.getAttribute(
          'data-news-category'
        )
        updateCategories()
        renderNews(1, true)
      })

      moreButton.addEventListener('click', function () {
        renderNews(currentPage + 1, false)
      })

      renderCategories()
      updateCategories()
      renderNews(1, true)
    })()
  </script>
</section>
