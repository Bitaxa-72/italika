                    isAvailable: true

            ];

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function formatPrice(value) {
                return Number(value).toLocaleString('ru-RU', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }) + ' ₽';
            }

            function getDiscountPercent(price, oldPrice) {
                if (!oldPrice || oldPrice <= price) {
                    return 0;
                }

                return Math.round((1 - price / oldPrice) * 100);
            }

            function createCardMarkup(product) {
                var discountPercent = getDiscountPercent(product.price, product.oldPrice);
                var savings = product.oldPrice ? product.oldPrice - product.price : 0;
                var stockText = product.isAvailable ? 'В наличии' : 'Ожидается поступление';
                var stockModifier = product.isAvailable ? ' sale-products__stock--available' : ' sale-products__stock--waiting';
                var cartText = product.isAvailable ? 'В корзину' : 'Ожидается';
                var cartLabel = product.isAvailable ? 'Добавить в корзину: ' + product.title : 'Ожидается поступление: ' + product.title;
                var cartDisabled = product.isAvailable ? '' : ' disabled';
                var favoriteActiveClass = product.isFavorite ? ' is-active' : '';
                var favoriteLabel = product.isFavorite ? 'Убрать из избранного: ' + product.title : 'Добавить в избранное: ' + product.title;
                var favoritePressed = product.isFavorite ? 'true' : 'false';
                var badgeMarkup = product.badge === 'Акция'
                    ? '<span class="sale-products__badges"><span class="sale-products__badge">Акция</span></span>'
                    : '';
                var priceBlock = '' +
                    '<span class="sale-products__price-block">' +
                    '<span class="sale-products__price-current">' + formatPrice(product.price) + '/шт</span>';

                if (product.oldPrice && product.oldPrice > product.price) {
                    priceBlock += '' +
                        '<span class="sale-products__price-old">' + formatPrice(product.oldPrice) + '</span>' +
                        '<span class="sale-products__benefit">' +
                        '<span class="sale-products__discount">-' + escapeHtml(discountPercent) + '%</span>' +
                        '<span class="sale-products__benefit-text">Экономия ' + formatPrice(savings) + '</span>' +
                        '</span>';
                }

                priceBlock += '</span>';

                return '' +
                    '<article class="sale-products__card search-results__card">' +
                    badgeMarkup +
                    '<button class="sale-products__favorite js-search-favorite' + favoriteActiveClass + '" type="button" aria-label="' + escapeHtml(favoriteLabel) + '" aria-pressed="' + favoritePressed + '">' +
                    '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
                    '<path d="M12 20.2 4.7 13.4A4.9 4.9 0 0 1 11.5 6l.5.6.5-.6a4.9 4.9 0 0 1 6.8 7.3L12 20.2Z" stroke-width="1.8" stroke-linejoin="round"></path>' +
                    '</svg>' +
                    '</button>' +
                    '<a class="sale-products__image-box" href="' + escapeHtml(product.href) + '">' +
                    '<img class="sale-products__image" src="' + escapeHtml(product.image) + '" alt="' + escapeHtml(product.title) + '" loading="lazy" decoding="async">' +
                    '</a>' +
                    '<span class="sale-products__content">' +
                    '<a class="sale-products__title-text" href="' + escapeHtml(product.href) + '">' + escapeHtml(product.title) + '</a>' +
                    '<span class="sale-products__stock' + stockModifier + '">' + escapeHtml(stockText) + '</span>' +
                    priceBlock +
                    '<button class="sale-products__cart js-search-cart" type="button" aria-label="' + escapeHtml(cartLabel) + '"' + cartDisabled + '>' +
                    '<span class="sale-products__cart-text">' + escapeHtml(cartText) + '</span>' +
                    '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
                    '<path d="M3.5 5H6l1.6 8.1c.1.7.7 1.2 1.4 1.2h7.7c.7 0 1.3-.5 1.4-1.2L19.5 8H7.1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>' +
                    '<circle cx="10" cy="18.2" r="1.2" fill="currentColor" stroke="none"></circle>' +
                    '<circle cx="17" cy="18.2" r="1.2" fill="currentColor" stroke="none"></circle>' +
                    '</svg>' +
                    '</button>' +
                    '</span>' +
                    '</article>';
            }

            function createSkeletonMarkup() {
                return '' +
                    '<div class="sale-products__card sale-products__card--skeleton">' +
                    '<span class="sale-products__skeleton-badges">' +
                    '<span class="sale-products__skeleton sale-products__skeleton-badge"></span>' +
                    '</span>' +
                    '<span class="sale-products__image-box">' +
                    '<span class="sale-products__skeleton sale-products__skeleton-image"></span>' +
                    '</span>' +
                    '<span class="sale-products__content">' +
                    '<span>' +
                    '<span class="sale-products__skeleton sale-products__skeleton-title"></span>' +
                    '<span class="sale-products__skeleton sale-products__skeleton-title"></span>' +
                    '<span class="sale-products__skeleton sale-products__skeleton-stock"></span>' +
                    '</span>' +
                    '<span class="sale-products__price-block">' +
                    '<span class="sale-products__skeleton sale-products__skeleton-price"></span>' +
                    '<span class="sale-products__skeleton sale-products__skeleton-old"></span>' +
                    '<span class="sale-products__skeleton sale-products__skeleton-benefit"></span>' +
                    '</span>' +
                    '<span class="sale-products__skeleton sale-products__skeleton-cart"></span>' +
                    '</span>' +
                    '</div>';
            }

            function appendMarkup(markup) {
                var wrapper = document.createElement('div');
                wrapper.innerHTML = markup;
                grid.appendChild(wrapper.firstChild);
            }

            function appendProducts(items) {
                var fragment = document.createDocumentFragment();
                var wrapper = document.createElement('div');
                var i = 0;

                for (i = 0; i < items.length; i++) {
                    wrapper.innerHTML = createCardMarkup(items[i]);
                    fragment.appendChild(wrapper.firstChild);
                }

                grid.appendChild(fragment);
            }

            function appendSkeletons(count) {
                var i = 0;

                for (i = 0; i < count; i++) {
                    appendMarkup(createSkeletonMarkup());
                }
            }

            function removeSkeletons() {
                var skeletons = grid.querySelectorAll('.sale-products__card--skeleton');
                var i = 0;

                for (i = 0; i < skeletons.length; i++) {
                    skeletons[i].parentNode.removeChild(skeletons[i]);
                }
            }

            function normalizeProducts(response) {
                if (Array.isArray(response)) {
                    return {
                        items: response,
                        total: response.length
                    };
                }

                return {
                    items: response.items || response.products || [],
                    total: response.total || response.count || (response.items || response.products || []).length
                };
            }

            function getDemoResults(query, page) {
                var normalizedQuery = query.trim().toLowerCase();
                var filteredProducts = normalizedQuery
                    ? demoProducts.filter(function (product) {
                        return product.title.toLowerCase().indexOf(normalizedQuery) !== -1;
                    })
                    : demoProducts;
                var start = (page - 1) * pageSize;

                return {
                    items: filteredProducts.slice(start, start + pageSize),
                    total: filteredProducts.length
                };
            }

            function requestProducts(query, page) {
                var url;

                if (!endpoint) {
                    return new Promise(function (resolve) {
                        setTimeout(function () {
                            resolve(getDemoResults(query, page));
                        }, 500);
                    });
                }

                url = new URL(endpoint, window.location.origin);
                url.searchParams.set('q', query);
                url.searchParams.set('page', page);
                url.searchParams.set('limit', pageSize);

                return fetch(url.toString(), {
                    headers: {
                        'Accept': 'application/json'
                    }
                })
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error('Search request failed');
                        }

                        return response.json();
                    })
                    .then(normalizeProducts);
            }

            function updateSummary() {
                var queryText = currentQuery ? ' по запросу "' + currentQuery + '"' : '';

                summary.textContent = totalCount
                    ? 'Найдено ' + totalCount + ' товаров' + queryText
                    : 'Нет товаров' + queryText;
            }

            function updateMoreButton() {
                var loadedCount = grid.querySelectorAll('.search-results__card').length;
                var hasMore = loadedCount < totalCount;

                moreButton.hidden = !hasMore;
                moreButton.disabled = !hasMore || isLoading;
                moreButton.classList.toggle('is-loading', isLoading);
                moreButtonText.textContent = isLoading ? 'Загрузка' : 'Загрузить еще';
            }

            function setLoading(nextState) {
                isLoading = nextState;
                section.classList.toggle('is-loading', isLoading);
                updateMoreButton();
            }

            function renderSearch(query, page, shouldReset) {
                var skeletonCount = pageSize;

                if (isLoading) {
                    return;
                }

                setLoading(true);
                empty.hidden = true;

                if (shouldReset) {
                    grid.innerHTML = '';
                    currentPage = 1;
                    totalCount = 0;
                }

                appendSkeletons(skeletonCount);

                requestProducts(query, page)
                    .then(function (result) {
                        removeSkeletons();
                        totalCount = result.total;
                        appendProducts(result.items);
                        currentPage = page;
                        currentQuery = query;
                        updateSummary();
                        empty.hidden = totalCount !== 0;
                    })
                    .catch(function () {
                        removeSkeletons();
                        summary.textContent = 'Не удалось загрузить результаты. Попробуйте еще раз.';
                    })
                    .finally(function () {
                        setLoading(false);
                    });
            }

            function getInitialQuery() {
                return new URLSearchParams(window.location.search).get('q') || '';
            }

            moreButton.addEventListener('click', function () {
                renderSearch(currentQuery, currentPage + 1, false);
            });

            grid.addEventListener('click', function (event) {
                var favoriteButton = event.target.closest('.js-search-favorite');
                var button = event.target.closest('.js-search-cart');
                var buttonText;
                var isFavorite;

                if (favoriteButton) {
                    isFavorite = !favoriteButton.classList.contains('is-active');
                    favoriteButton.classList.toggle('is-active', isFavorite);
                    favoriteButton.setAttribute('aria-pressed', isFavorite ? 'true' : 'false');
                    favoriteButton.setAttribute('aria-label', isFavorite ? 'Убрать товар из избранного' : 'Добавить товар в избранное');

                    return;
                }

                if (!button || button.disabled) {
                    return;
                }

                buttonText = button.querySelector('.sale-products__cart-text');
                button.classList.add('is-added');
                button.setAttribute('aria-label', 'Товар добавлен в корзину');

                if (buttonText) {
                    buttonText.textContent = 'Добавлено';
                }
            });

            currentQuery = getInitialQuery();
            renderSearch(currentQuery, 1, true);
        })();
    </script>
