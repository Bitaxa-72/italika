<header class="header">
  <div class="container">
    <div class="header__shell">

            class="logo__svg"
            height="60"
            alt=""

        </a>

        <div class="header-search">

              data-placeholder-tablet="Поиск товаров"

              autocomplete="off"
            />
            <button

              type="submit"
              aria-label="Найти"

              aria-label="Подсказки поиска"

              <div class="search-suggest__list">
                <a class="search-suggest__item" href="#">

                    aria-hidden="true"

                        stroke-width="1.8"
                        stroke-linecap="round"
